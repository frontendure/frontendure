<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Frontendure</title>
    <meta name="description"
        content="View our portfolio of modern, high-performance websites and digital experiences. Discover how Frontendure helps businesses go live with style.">
    <meta name="keywords" content="web design portfolio, development showcase, project gallery, frontendure work">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portfolio-page {
            padding-top: 8rem;
            padding-bottom: 4rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .project-item {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 4/3;
            cursor: pointer;
        }

        .project-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .project-item:hover img {
            transform: scale(1.05);
        }

        .project-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10, 10, 15, 0.95), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Always show overlay on touch devices */
        @media (hover: none) {
            .project-overlay {
                opacity: 1;
            }
        }

        .project-item:hover .project-overlay {
            opacity: 1;
        }

        .project-overlay h3 {
            color: #fff;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            margin-bottom: 0.4rem;
        }

        .project-overlay p {
            color: var(--accent-primary);
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .project-overlay .btn {
            align-self: flex-start;
            padding: 0.45rem 1rem;
            font-size: 0.78rem;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .portfolio-page {
                padding-top: 6rem;
                padding-bottom: 3rem;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="portfolio-page container">
        <h1 class="section-title">Our Work</h1>
        <p style="text-align:center; color: var(--text-muted); max-width: 600px; margin: 0 auto;">Take a look at the
            modern and scalable digital experiences we have crafted for our clients.</p>

        <div class="gallery">
            <!-- Project 1 -->
            <div class="project-item">
                <img src="https://via.placeholder.com/600x450/151520/00f0ff?text=Project+One"
                    alt="Frontendure Project One - Modern Web Design Showcase" loading="lazy" decoding="async"
                    width="600" height="450">
                <div class="project-overlay">
                    <h3>Project Name 1</h3>
                    <p>Web Design &amp; Development</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
            <!-- Project 2 -->
            <div class="project-item">
                <img src="https://via.placeholder.com/600x450/151520/7000ff?text=Project+Two"
                    alt="Frontendure Project Two - E-Commerce Platform" loading="lazy" decoding="async" width="600"
                    height="450">
                <div class="project-overlay">
                    <h3>Project Name 2</h3>
                    <p>E-Commerce Platform</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
            <!-- Project 3 -->
            <div class="project-item">
                <img src="https://via.placeholder.com/600x450/151520/00f0ff?text=Project+Three"
                    alt="Frontendure Project Three - SEO and Landing Page" loading="lazy" decoding="async" width="600"
                    height="450">
                <div class="project-overlay">
                    <h3>Project Name 3</h3>
                    <p>SEO &amp; Landing Page</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>

</html>
