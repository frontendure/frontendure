<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Frontendure</title>
    <meta name="description"
        content="Get in touch with Frontendure today. Whether you have a project in mind or just want to say hello, we're ready to help your business go live.">
    <meta name="keywords" content="contact frontendure, project inquiry, web development contact, hire developers">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-page {
            padding-top: 8rem;
            padding-bottom: 4rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            max-width: 800px;
            width: 100%;
        }

        .contact-wrapper {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-top: 2.5rem;
        }

        .contact-info {
            margin-bottom: 2rem;
            text-align: center;
        }

        .contact-info h3 {
            font-size: clamp(1.3rem, 3vw, 1.7rem);
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .contact-info p {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .contact-info a {
            color: var(--accent-primary);
            font-weight: 600;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            display: inline-block;
            margin-top: 0.5rem;
            word-break: break-all;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(10, 10, 15, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            align-self: flex-start;
            margin-top: 0.75rem;
        }

        @media (max-width: 600px) {
            .contact-page {
                padding-top: 6rem;
                padding-bottom: 3rem;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }

            .contact-wrapper {
                padding: 1.5rem;
            }

            .submit-btn {
                align-self: stretch;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="contact-page container">
        <h1 class="section-title">Let's Talk</h1>

        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Ready to go live?</h3>
                <p>Reach out to us directly or fill out the form below.</p>
                <a href="mailto:frontendure@atomicmail.io">frontendure@atomicmail.io</a>
            </div>

            <form action="https://formspree.io/f/xaqalelw" method="POST" class="contact-form" id="contact-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us about your project..."
                        required></textarea>
                </div>
                <button type="submit" class="btn btn-primary submit-btn" id="submit-btn">Send Message</button>
                <div id="contact-status"
                    style="margin-top: 1rem; border-radius: var(--radius-md); padding: 0.8rem; display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("contact-status");
        const submitBtn = document.getElementById("submit-btn");

        async function handleSubmit(event) {
            event.preventDefault();
            const data = new FormData(event.target);

            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    status.innerHTML = "Thanks for your submission! We'll get back to you soon.";
                    status.style.display = "block";
                    status.style.backgroundColor = "rgba(0, 255, 136, 0.1)";
                    status.style.color = "#00ff88";
                    status.style.border = "1px solid rgba(0, 255, 136, 0.2)";
                    form.reset();
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.innerHTML = "Oops! There was a problem submitting your form";
                        }
                        status.style.display = "block";
                        status.style.backgroundColor = "rgba(255, 68, 68, 0.1)";
                        status.style.color = "#ff4444";
                        status.style.border = "1px solid rgba(255, 68, 68, 0.2)";
                    })
                }
            }).catch(error => {
                status.innerHTML = "Oops! There was a problem submitting your form";
                status.style.display = "block";
                status.style.backgroundColor = "rgba(255, 68, 68, 0.1)";
                status.style.color = "#ff4444";
                status.style.border = "1px solid rgba(255, 68, 68, 0.2)";
            }).finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = "Send Message";
            });
        }
        form.addEventListener("submit", handleSubmit)
    </script>
</body>

</html>
